<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Switch Statement</h1>

    <buttom class="btn btn-info" onclick = "teamRank()">Rank</buttom>

    <script>
        var rank = "1st";

        var message = "";

        switch(true){
            case (rank === "1st"): //compare
                message = "Champions!";
                break;
            case (rank === "2nd"): //compare
                message = "Second Placer!";
                break;
            case (rank === "3rd"): //compare
                message = "Third Placer!";
                break;
            case (rank === "4th"): //compare
                message = "Last Placer!";
                break;
            default:
                alert("Rank not available at this time.");
        }

        let team = "Yellow"; //string

        switch (team){
            case "Yellow":
                alert("Go Yellow Tigers! Woohoo!");
                break;
            case "Blue":
                alert("Go Blue Bears! For the win!")
                break;  
            case "Red":
                alert("Go Red Bulldogs! Laban!")
                break;
            case "Green":
                alert("Go Green Hornets! Malakas!")
                break;
            default:
                alert("Team could not be determined")
        }
    </script>

</body>
</html>
